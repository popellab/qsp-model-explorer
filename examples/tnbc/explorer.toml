# qsp-model-explorer config for the published QSPIO-TNBC model.
#
# Self-contained example: run it straight from a clone of qsp-model-explorer with
#   qsp-model-explorer --repo examples/tnbc
# The vendored qsp_sim binary is macOS (arm64). On another platform, rebuild it from
# https://github.com/popellab/QSPIO-TNBC and drop it at cpp/sim/build/qsp_sim.
#
# Paths are relative to this directory (the --repo). See ./NOTICE for attribution.

[model]
name = "QSPIO-TNBC (example)"

[build]
binary = "cpp/sim/build/qsp_sim"     # prebuilt, MIT-licensed, vendored from QSPIO-TNBC
build_dir = "cpp/sim/build"
ode_system = "cpp/qsp/ode/ODE_system.cpp"   # enables Hill-driver signs on the diagram
# no cmake_source: treated as prebuilt, never recompiled

[paths]
template = "resources/cpp/param_all.xml"
priors_csv = "priors.csv"                    # 88 rate constants, generated from the template
model_structure = "model_structure.json"     # generated by qsp-export-model (see README)
drug_metadata = "resources/cpp/drug_metadata.yaml"

[sim]
extra_args = ["--min-cadence-hours", "24"]

[[scenarios]]
id = "baseline"
yaml = "scenarios/baseline.yaml"
t_end = 400.0

[views]
# A spread across the model: tumor, T cells, APCs, myeloid suppression, vasculature.
curated = [
    "k_C1_growth", "k_C1_death", "k_C2_growth",
    "k_T0_act", "k_T0_pro", "k_T0_death",
    "k_APC_mat", "k_APC_mig", "k_ArgI_sec",
    "k_vas_Csec", "K_T_C", "K_T_Treg",
]

# Key tumor-microenvironment readouts to sparkline over the run.
traj_species = [
    "V_T.C1", "V_T.C_x", "V_T.T1", "V_T.T1_exh", "V_T.Th",
    "V_T.APC", "V_T.Mac_M1", "V_T.Mac_M2", "V_T.MDSC",
    "V_T.TGFb", "V_T.IFNg", "V_T.IL10",
]

[views.modules]
# Whiteboard-level cancer-immunity cycle, in signal-flow order. Names are filtered
# against the live model at load, so any that don't exist drop silently.
"Overview" = [
    "V_T.C1", "V_T.APC", "V_LN.mAPC", "V_LN.T1", "V_T.T1", "V_T.T1_exh",
    "V_T.C_x", "V_T.Mac_M2", "V_T.MDSC", "V_T.TGFb", "V_T.IFNg", "V_T.IL10",
]
"T-cell activation" = [
    "V_LN.APC", "V_LN.mAPC", "V_LN.nT1", "V_LN.aT1", "V_LN.T1",
    "V_C.T1", "V_T.T1", "V_T.T1_exh", "V_T.IFNg",
]
"Tumor & killing" = [
    "V_T.C1", "V_T.C2", "V_T.C_x", "V_T.T1", "V_T.T1_exh", "V_T.NabP",
]
"Myeloid & suppression" = [
    "V_T.APC", "V_T.Mac_M1", "V_T.Mac_M2", "V_T.MDSC",
    "V_T.TGFb", "V_T.IL10", "V_T.IL12",
]
